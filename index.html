<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Demo Venta de Boletos</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#A93312;
    --primary-dark:#8D2A10;
    --beige:#F1EAD8;
    --cream:#F8F5EF;
    --text:#2F2F2F;
    --border:#DDD4C1;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Montserrat',sans-serif;
    background:var(--beige);
    color:var(--text);
}

/* TOP BAR */
.topbar{
    background:var(--primary);
    color:white;
    font-size:12px;
    font-weight:600;
    padding:10px;
    text-align:center;
}

/* HEADER */
header{
    background:#f8f7f4;
    height:120px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 60px;
}

.logo{
    font-size:52px;
    color:var(--primary);
    font-weight:bold;
    font-family:'Playfair Display',serif;
}

.logo span{
    display:block;
    font-size:16px;
    color:#3D7A34;
    margin-top:-10px;
}

nav{
    display:flex;
    gap:40px;
}

nav a{
    text-decoration:none;
    color:#333;
    font-size:18px;
}

/* HERO */
.hero{
    height:420px;
    background:
    linear-gradient(rgba(0,0,0,.15),rgba(0,0,0,.15)),
    url('https://images.unsplash.com/photo-1549366021-9f761d450615?auto=format&fit=crop&w=1600&q=80');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
}

.hero h1{
    color:white;
    font-size:90px;
    font-family:'Playfair Display',serif;
    font-style:italic;
}

/* CONTENT */
.content{
    max-width:1400px;
    margin:auto;
    padding:50px 30px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
}

.product{
    background:var(--cream);
    padding:20px;
    text-align:center;
}

/* TICKET */
.ticket{
    width:220px;
    height:320px;
    margin:auto;
    border-radius:12px;
    background:linear-gradient(#f6d9b5,#efc79b);
    border:4px solid #d2a575;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    box-shadow:0 10px 20px rgba(0,0,0,.15);
}

.ticket h3{
    font-family:'Playfair Display',serif;
    font-size:28px;
    color:#7c3e15;
}

.ticket p{
    font-size:18px;
    margin-top:10px;
}

/* 🔥 BOTÓN MEJORADO (SOLO ESTO CAMBIÓ) */
.vivenu-btn{
    display:inline-block;
    width:100%;
    margin-top:18px;
    padding:14px;
    text-align:center;

    background:var(--primary);
    color:white;
    text-decoration:none;

    font-weight:600;
    border-radius:10px;

    transition:all .25s ease;
    box-shadow:0 6px 15px rgba(0,0,0,.12);
    position:relative;
    overflow:hidden;
}

.vivenu-btn:hover{
    background:var(--primary-dark);
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(0,0,0,.18);
}

.vivenu-btn:active{
    transform:translateY(0);
}

/* brillo animado */
.vivenu-btn::after{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,.3),transparent);
    transition:.5s;
}

.vivenu-btn:hover::after{
    left:100%;
}

/* CART */
.cart{
    position:fixed;
    right:-420px;
    top:0;
    width:400px;
    height:100%;
    background:white;
    box-shadow:-10px 0 20px rgba(0,0,0,.2);
    transition:.3s;
    padding:25px;
    z-index:999;
}

.cart.active{
    right:0;
}

footer{
    background:#F7F4EE;
    margin-top:80px;
    text-align:center;
    padding:30px;
    border-top:1px solid var(--border);
}

</style>
</head>
<script type="text/javascript" src="https://vivenu.dev/web/deliver/js/v1/embed.js"></script>
<body>

</div>

</div>

</div>

<footer>
© 2025 Sistema Demo de Venta de Boletos
</footer>

</body>
</html>
